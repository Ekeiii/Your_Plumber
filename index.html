<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Plumber 🛠️</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="https://emojiisland.com/components/com_virtuemart/shop_image/product/Wrench_Emoji_Icon_ios10_large.png">
    <link rel="apple-touch-icon" href="https://emojiisland.com/components/com_virtuemart/shop_image/product/Wrench_Emoji_Icon_ios10_large.png">

    <style>
        :root { 
            --primary: #1e88e5; 
            --accent: #ffd600;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Αρχικό Φόντο (Εργαλεία) */
            background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                              url('https://images.unsplash.com/photo-1504148455328-c376907d081c?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            transition: background-image 0.5s ease-in-out;
        }

        #app-container {
            max-width: 500px;
            width: 100%;
            padding: 20px;
            text-align: center;
            /* Χωρίς κεντρικό πλαίσιο - τα στοιχεία επιπλέουν */
        }
        
        h1 { 
            font-size: 38px; 
            margin-bottom: 5px; 
            text-shadow: 2px 4px 10px rgba(0,0,0,0.8);
            color: white;
        }

        .subtitle { 
            font-size: 18px;
            margin-bottom: 30px; 
            text-shadow: 1px 2px 5px rgba(0,0,0,0.8);
            font-weight: bold;
            opacity: 0.9;
        }

        .hidden { display: none; }
        
        /* Grid Menu & Cards (Glass Style) */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        
        .card { 
            background: rgba(255, 255, 255, 0.92); 
            color: #222;
            padding: 25px 15px; 
            border-radius: 24px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .card:hover { 
            transform: translateY(-8px); 
            background: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .emoji { font-size: 45px; display: block; margin-bottom: 10px; }

        /* Step Wizard & Instructions */
        .tools-list { 
            background: rgba(255, 214, 0, 0.95); 
            color: #000;
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            text-align: left; 
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .instruction { 
            font-size: 22px; 
            line-height: 1.5; 
            margin-bottom: 40px; 
            min-height: 120px; 
            text-shadow: 2px 2px 10px rgba(0,0,0,1); /* Πολύ έντονη σκιά για να διαβάζεται */
            font-weight: 500;
        }
        
        /* Buttons */
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 18px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.2s;
        }

        button:active { transform: scale(0.96); }

        .btn-secondary { 
            background: rgba(255,255,255,0.2); 
            backdrop-filter: blur(8px);
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
        }

        .progress { 
            font-size: 14px; 
            margin-bottom: 10px; 
            font-weight: bold; 
            letter-spacing: 1.5px;
            color: var(--accent);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        h3 { font-size: 24px; margin-bottom: 20px; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div id="app-container">
    <h1>Your Plumber 🛠️</h1>

    <div id="view-categories">
        <p class="subtitle">Τι χάλασε πάλι ρε Τσάτσε;</p>
        <div class="grid">
            <div class="card" onclick="showProblems('shower')">
                <span class="emoji">🚿</span>Ντουζιέρα
            </div>
            <div class="card" onclick="showProblems('sink')">
                <span class="emoji">🚰</span>Νιπτήρας
            </div>
            <div class="card" onclick="showProblems('toilet')">
                <span class="emoji">🚽</span>Λεκάνη
            </div>
            <div class="card" onclick="showProblems('radiator')">
                <span class="emoji">🔥</span>Καλοριφέρ
            </div>
        </div>
    </div>

    <div id="view-problems" class="hidden">
        <h3>Ποιο είναι το θέμα;</h3>
        <div id="problems-list"></div>
        <button class="btn-secondary" onclick="resetApp()">← Πίσω</button>
    </div>

    <div id="view-steps" class="hidden">
        <div class="progress" id="step-counter">ΒΗΜΑ 1 ΑΠΟ X</div>
        <div id="tools-needed" class="tools-list"></div>
        <div class="instruction" id="step-text"></div>
        <button id="next-btn" onclick="nextStep()">Επόμενο</button>
        <button class="btn-secondary" onclick="resetApp()">Ακύρωση</button>
    </div>
</div>

<script>
    const data = {
        shower: {
            bg: "https://images.unsplash.com/photo-1620560103986-19601939eb5d?q=80&w=2000",
            problems: [
                {
                    title: "Χαμηλή πίεση / Άλατα",
                    tools: ["Λευκό Ξύδι", "Πλαστική Σακούλα", "Λαστιχάκι"],
                    steps: [
                        "Γέμισε μια πλαστική σακούλα με λευκό ξύδι.",
                        "Βύθισε το τηλέφωνο της ντουζιέρας μέσα στη σακούλα.",
                        "Δέσε τη σακούλα σφιχτά με το λαστιχάκι.",
                        "Άφησέ το να δράσει για τουλάχιστον 3 ώρες.",
                        "Βγάλε τη σακούλα και άνοιξε το ζεστό νερό!"
                    ]
                },
                {
                    title: "Στάζει η ένωση",
                    tools: ["Καινούργια φλάντζα (λαστιχάκι)", "Πένσα"],
                    steps: [
                        "Ξεβίδωσε το τηλέφωνο από το σπιράλ.",
                        "Βγάλε το παλιό λαστιχάκι από την υποδοχή.",
                        "Τοποθέτησε τη νέα φλάντζα προσεκτικά.",
                        "Βίδωσε πάλι το τηλέφωνο και σφίξε ελαφρά."
                    ]
                }
            ]
        },
        sink: {
            bg: "https://images.unsplash.com/photo-1585938389612-a562a99700bb?q=80&w=2000",
            problems: [
                {
                    title: "Βουλωμένο σιφώνι",
                    tools: ["Κουβάς", "Πένσα", "Σύρμα"],
                    steps: [
                        "Βάλε τον κουβά κάτω από το σιφώνι.",
                        "Ξεβίδωσε το κάτω μέρος του σιφωνιού με το χέρι.",
                        "Καθάρισε τις βρωμιές και το πουρί.",
                        "Βίδωσε το πάλι προσεκτικά για να μην χάνει νερό."
                    ]
                }
            ]
        },
        toilet: {
            bg: "https://images.unsplash.com/photo-1581244276891-8339c36ec31a?q=80&w=2000",
            problems: [{ title: "Το καζανάκι τρέχει", tools: ["Φλοτέρ"], steps: ["Έλεγξε αν το φλοτέρ έχει κολλήσει..."]}]
        },
        radiator: {
            bg: "https://images.unsplash.com/photo-1521207418485-99c705420785?q=80&w=2000",
            problems: [{ title: "Εξαέρωση", tools: ["Κλειδί εξαέρωσης", "Πανί"], steps: ["Άνοιξε τη βαλβίδα σιγά-σιγά..."]}]
        }
    };

    let currentSteps = [];
    let currentStepIndex = 0;

    function showProblems(cat) {
        // ΑΛΛΑΓΗ ΦΟΝΤΟΥ
        if(data[cat] && data[cat].bg) {
            document.body.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('${data[cat].bg}')`;
        }

        document.getElementById('view-categories').classList.add('hidden');
        document.getElementById('view-problems').classList.remove('hidden');
        const list = document.getElementById('problems-list');
        list.innerHTML = "";
        
        data[cat].problems.forEach((prob) => {
            const btn = document.createElement('button');
            btn.style.marginBottom = "15px";
            btn.innerText = prob.title;
            btn.onclick = () => startWizard(prob);
            list.appendChild(btn);
        });
    }

    function startWizard(prob) {
        document.getElementById('view-problems').classList.add('hidden');
        document.getElementById('view-steps').classList.remove('hidden');
        currentSteps = prob.steps;
        currentStepIndex = 0;
        document.getElementById('tools-needed').innerHTML = "<strong>Εργαλεία:</strong> " + prob.tools.join(", ");
        updateStep();
    }

    function updateStep() {
        document.getElementById('step-counter').innerText = `ΒΗΜΑ ${currentStepIndex + 1} ΑΠΟ ${currentSteps.length}`;
        document.getElementById('step-text').innerText = currentSteps[currentStepIndex];
        document.getElementById('next-btn').innerText = (currentStepIndex === currentSteps.length - 1) ? "ΤΕΛΟΣ! ΕΓΙΝΕ 👍" : "ΕΠΟΜΕΝΟ";
    }

    function nextStep() {
        if (currentStepIndex < currentSteps.length - 1) {
            currentStepIndex++;
            updateStep();
        } else {
            alert("Μόλις το έφτιαξες! 50$!");
            resetApp();
        }
    }

    function resetApp() {
        // ΕΠΙΣΤΡΟΦΗ ΣΤΟ ΑΡΧΙΚΟ ΦΟΝΤΟ
        const mainImg = "https://images.unsplash.com/photo-1504148455328-c376907d081c?q=80&w=2000";
        document.body.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('${mainImg}')`;
        
        document.getElementById('view-categories').classList.remove('hidden');
        document.getElementById('view-problems').classList.add('hidden');
        document.getElementById('view-steps').classList.add('hidden');
    }
</script>

</body>
</html>
